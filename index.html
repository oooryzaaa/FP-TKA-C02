<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Order Dashboard | Enterprise</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Using Plus Jakarta Sans for a more modern, premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Advanced Animated Background -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="glass-overlay"></div>
    </div>

    <main class="container">
        <header class="hero-header">
            <div class="badge">Enterprise Ready</div>
            <h1 class="gradient-text">Cloud Provisioning</h1>
            <p>Seamlessly deploy and manage your infrastructure at scale.</p>
        </header>

        <div class="dashboard-grid">
            <!-- Create Order Form -->
            <section class="premium-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <h2>Deploy Resource</h2>
                    <form id="orderForm">
                        <div class="input-group">
                            <input type="text" id="customer_name" required placeholder=" " autocomplete="off">
                            <label for="customer_name">Team / Owner Name</label>
                            <div class="input-border"></div>
                        </div>
                        
                        <div class="input-group">
                            <input type="text" id="item" required placeholder=" " autocomplete="off">
                            <label for="item">Azure Resource SKU</label>
                            <div class="input-border"></div>
                        </div>

                        <div class="input-group">
                            <input type="number" id="quantity" required min="1" value="1" placeholder=" ">
                            <label for="quantity">Instance Count</label>
                            <div class="input-border"></div>
                        </div>

                        <button type="submit" class="btn-glow" id="submitBtn">
                            <span class="btn-text">Initialize Deployment</span>
                            <div class="loader hidden"></div>
                        </button>
                    </form>
                    <div id="formMessage" class="message hidden"></div>
                </div>
            </section>

            <!-- Orders List -->
            <section class="premium-card list-section">
                <div class="card-glow"></div>
                <div class="card-content">
                    <div class="list-header">
                        <h2>Active Deployments</h2>
                        <button id="refreshBtn" class="icon-btn" title="Sync Status">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.09l5.67-5.67"/></svg>
                        </button>
                    </div>
                    
                    <div id="ordersList" class="orders-viewport">
                        <div class="state-container">
                            <div class="spinner"></div>
                            <p>Establishing secure connection to backend...</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Details Modal -->
    <div id="orderModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="premium-card modal-panel">
            <div class="modal-header">
                <h3>Resource State</h3>
                <button id="closeModal" class="icon-btn close-btn">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // API Config
        const API_BASE_URL = "/api"; 
        
        // Elements
        const orderForm = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        const loader = submitBtn.querySelector('.loader');
        const formMessage = document.getElementById('formMessage');
        const ordersList = document.getElementById('ordersList');
        const refreshBtn = document.getElementById('refreshBtn');
        const orderModal = document.getElementById('orderModal');
        const closeModalBtn = document.getElementById('closeModal');
        const modalBody = document.getElementById('modalBody');
        const modalBackdrop = document.querySelector('.modal-backdrop');

        // Fetch Orders
        async function fetchOrders() {
            refreshBtn.classList.add('spinning');
            try {
                const response = await fetch(`${API_BASE_URL}/orders`);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                if (data.length === 0) {
                    ordersList.innerHTML = `
                        <div class="state-container empty">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                            <p>No resources deployed yet.</p>
                        </div>`;
                    return;
                }

                ordersList.innerHTML = data.map((order, i) => `
                    <div class="data-row animate-in" style="animation-delay: ${i * 0.05}s" onclick="viewOrder('${order._id || order.id}')">
                        <div class="row-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"></path></svg>
                        </div>
                        <div class="row-main">
                            <h4>${order.item} <span class="qty">x${order.quantity}</span></h4>
                            <span class="owner">${order.customer_name}</span>
                        </div>
                        <div class="row-status">
                            <span class="badge-${(order.status || 'pending').toLowerCase()}">
                                <span class="dot"></span> ${order.status || 'Pending'}
                            </span>
                            <span class="id-hash">#${(order._id || order.id).substring(0, 6)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                ordersList.innerHTML = `
                    <div class="state-container error">
                        <div class="pulse-ring"></div>
                        <p style="color: #f87171; margin-bottom: 8px;">Awaiting Backend Connection</p>
                        <small style="color: #94a3b8;">Nginx proxy is running, waiting for Flask on BE1/BE2.</small>
                    </div>`;
            } finally {
                setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
            }
        }

        // Create Order
        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const customer_name = document.getElementById('customer_name').value;
            const item = document.getElementById('item').value;
            const quantity = parseInt(document.getElementById('quantity').value);

            submitBtn.classList.add('loading');
            
            try {
                const response = await fetch(`${API_BASE_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_name, item, quantity, status: "Pending" })
                });

                if (!response.ok) throw new Error('Creation failed');
                
                showMessage('Provisioning initiated successfully.', 'success');
                orderForm.reset();
                fetchOrders();
            } catch (error) {
                showMessage('Connection rejected. Backend offline.', 'error');
            } finally {
                submitBtn.classList.remove('loading');
            }
        });

        // View Order
        async function viewOrder(id) {
            orderModal.classList.remove('hidden');
            // Allow display trick for animation
            setTimeout(() => orderModal.classList.add('show'), 10);
            
            modalBody.innerHTML = '<div class="state-container"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/order/${id}`);
                if (!response.ok) throw new Error('Not found');
                const order = await response.json();
                
                modalBody.innerHTML = `
                    <div class="info-group">
                        <label>Resource Hash</label>
                        <div class="value font-mono">${order._id || order.id}</div>
                    </div>
                    <div class="info-split">
                        <div class="info-group">
                            <label>Owner</label>
                            <div class="value">${order.customer_name}</div>
                        </div>
                        <div class="info-group">
                            <label>Count</label>
                            <div class="value">${order.quantity}</div>
                        </div>
                    </div>
                    <div class="info-group">
                        <label>SKU</label>
                        <div class="value highlight">${order.item}</div>
                    </div>
                    <div class="info-group">
                        <label>Lifecycle State</label>
                        <div class="custom-select">
                            <select id="statusUpdate">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>⏳ Pending</option>
                                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>⚙️ Processing</option>
                                <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>✅ Completed</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="updateOrderStatus('${id}')" class="btn-glow action-update">
                        <span class="btn-text">Apply State Change</span>
                    </button>
                `;
            } catch (error) {
                modalBody.innerHTML = '<div class="state-container error">Failed to sync state.</div>';
            }
        }

        // Update
        async function updateOrderStatus(id) {
            const newStatus = document.getElementById('statusUpdate').value;
            const btn = document.querySelector('.action-update');
            btn.classList.add('loading');

            try {
                await fetch(`${API_BASE_URL}/order/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                closeModal();
                fetchOrders();
            } catch (error) {
                alert("Failed to update status");
                btn.classList.remove('loading');
            }
        }

        // Utils
        function showMessage(text, type) {
            formMessage.textContent = text;
            formMessage.className = `message ${type} show`;
            setTimeout(() => { formMessage.classList.remove('show'); }, 4000);
        }

        function closeModal() {
            orderModal.classList.remove('show');
            setTimeout(() => orderModal.classList.add('hidden'), 300);
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', closeModal);
        refreshBtn.addEventListener('click', fetchOrders);

        // Init
        fetchOrders();
    </script>
</body>
</html>
